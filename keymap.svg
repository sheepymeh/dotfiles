		<style>
			.frame { fill: #181825; stroke: #45475a; stroke-width: 2; }
			.key { fill: #45475a; stroke: #585b70; stroke-width: 2; }

			.apps { stroke: #fab387; }
			.workspace { stroke: #cba6f7; }
			.focus { stroke: #74c7ec; }
			.floating { stroke: #94e2d5; }
			.layout { stroke: #89b4fa; }
			.system { stroke: #f38ba8; }

			.label { font-family: monospace; font-size: 16px; fill: #cdd6f4; text-anchor: middle; dominant-baseline: middle; }
			.small { font-size: 12px; fill: #bac2de; }

			.note { font-family: monospace; font-size: 16px; fill: #cdd6f4; }
			.title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #cdd6f4; }
			.subtitle { font-family: monospace; font-size: 16px; fill: #a6adc8; }

			.legendText { font-family: monospace; font-size: 16px; fill: #bac2de; }
			.legendSwatch { stroke: #45475a; stroke-width: 1.5; rx: 6; ry: 6; }
		</style>
	</defs>

	<rect class="frame" width="1224" height="700"/>

