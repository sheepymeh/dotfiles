floating_modifier $mod normal

bindsym $mod+d      exec $menu
bindsym $mod+Return exec $term
bindsym --inhibited $mod+q kill

bindsym {
    $mod+Shift+c reload
    $mod+Shift+e exec swaynag -t warning -m 'Do you want to exit Sway?' -b 'Yes, exit sway' 'swaymsg exit'
}

bindsym --locked $mod+Shift+s exec --no-startup-id systemctl suspend

bindsym {
    $mod+e exec $filemanager ~
    $mod+b exec $browser
    $mod+c exec $editor
    $mod+l exec swaylock
}


# Move
bindsym {
    $mod+Left   focus left
    $mod+Down   focus down
    $mod+Up     focus up
    $mod+Right  focus right

    $mod+z      focus left
    $mod+x      focus right

    $mod+Shift+Left     move left
    $mod+Shift+Down     move down
    $mod+Shift+Up       move up
    $mod+Shift+Right    move right
}


# Resizing
mode "resize" {
    bindsym {
        minus   resize shrink width $resize_step
        equal   resize grow width $resize_step
        Down    resize shrink height $resize_step
        Up      resize grow height $resize_step

        Return mode "default"
        Escape mode "default"
    }
}
bindsym $mod+r mode "resize"


# Hardware keys
bindsym --inhibited --locked {
    XF86Sleep               exec --no-startup-id systemctl suspend

    XF86MonBrightnessUp     exec --no-startup-id brightnessctl --machine-readable set 5%+ | cut -d\, -f4 | tr -d % >$WOBSOCK
    XF86MonBrightnessDown   exec --no-startup-id brightnessctl --machine-readable set 5%- | cut -d\, -f4 | tr -d % >$WOBSOCK

    XF86AudioRaiseVolume    exec --no-startup-id wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume --limit 1 @DEFAULT_AUDIO_SINK@ $audio_step%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | sed 's/[^0-9]//g' > $WOBSOCK
    XF86AudioLowerVolume    exec --no-startup-id wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume --limit 1 @DEFAULT_AUDIO_SINK@ $audio_step%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | sed 's/[^0-9]//g' > $WOBSOCK
    XF86AudioMute           exec --no-startup-id wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && (wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && echo 0 > $WOBSOCK) || wpctl get-volume @DEFAULT_AUDIO_SINK@ | sed 's/[^0-9]//g' > $WOBSOCK

    XF86AudioPlay           exec --no-startup-id playerctl play-pause
    XF86AudioPause          exec --no-startup-id playerctl pause
    XF86AudioStop           exec --no-startup-id playerctl stop
    XF86AudioNext           exec --no-startup-id playerctl next
    XF86AudioPrev           exec --no-startup-id playerctl previous

}

set $mictoggle wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindsym $mod+m exec --no-startup-id $mictoggle
bindsym --inhibited XF86AudioMicMute --no-startup-id exec $mictoggle

bindsym {
    XF86TouchpadOff exec --no-startup-id notify-send "Touchpad disabled" "Press touchpad button to enable"
    XF86TouchpadOn  exec --no-startup-id notify-send "Touchpad enabled" "Press touchpad button to disable"
}


# Screenshots
# -> ctrl to save
# -> alt to select area
# -> mod to record
bindsym --inhibited {
    Print           exec --no-startup-id grim - | wl-copy
    Ctrl+Print      exec --no-startup-id grim $screenshot_path
    Alt+Print       exec --no-startup-id grim -g "$(slurp)" - | wl-copy
    Ctrl+Alt+Print  exec --no-startup-id grim -g "$(slurp)" $screenshot_path
    $mod+Print      exec --no-startup-id record.sh
    $mod+Alt+Print  exec --no-startup-id record.sh slurp
}


# Layout
bindsym {
    $mod+h splith
    $mod+v splitv
    $mod+f fullscreen
}

bindsym {
    $mod+Space floating toggle
    $mod+Alt+Space focus mode_toggle  # swap focus between tiling and floating areas
    $mod+Ctrl+Space move scratchpad
    $mod+s scratchpad show
}

# Move between screens
bindsym {
    $mod+p focus output right
    $mod+Ctrl+p move workspace to output right
}


# Workspaces
bindsym --inhibited {
    $mod+Tab workspace next_on_output
    $mod+Grave workspace prev_on_output
    $mod+a workspace back_and_forth
    $mod+Escape exec --no-startup-id swaymsg workspace $(swaymsg -t get_workspaces | jq 'max_by(.num).num+1')  # new workspace
}

bindsym --inhibited {
    $mod+1 workspace number 1
    $mod+2 workspace number 2
    $mod+3 workspace number 3
    $mod+4 workspace number 4
    $mod+5 workspace number 5
    $mod+6 workspace number 6
    $mod+7 workspace number 7
    $mod+8 workspace number 8
    $mod+9 workspace number 9
    $mod+0 exec --no-startup-id swaymsg workspace number $(swaymsg -t get_workspaces | jq 'max_by(.num).num')  # last workspace
}
bindsym --inhibited {
    $mod+Alt+1 move container to workspace number 1
    $mod+Alt+2 move container to workspace number 2
    $mod+Alt+3 move container to workspace number 3
    $mod+Alt+4 move container to workspace number 4
    $mod+Alt+5 move container to workspace number 5
    $mod+Alt+6 move container to workspace number 6
    $mod+Alt+7 move container to workspace number 7
    $mod+Alt+8 move container to workspace number 8
    $mod+Alt+9 move container to workspace number 9
    $mod+Alt+0 exec --no-startup-id swaymsg move container to workspace number $(swaymsg -t get_workspaces | jq 'max_by(.num).num')  # last workspace
}
bindsym --inhibited {
    $mod+Ctrl+1 move container to workspace number 1, workspace number 1
    $mod+Ctrl+2 move container to workspace number 2, workspace number 2
    $mod+Ctrl+3 move container to workspace number 3, workspace number 3
    $mod+Ctrl+4 move container to workspace number 4, workspace number 4
    $mod+Ctrl+5 move container to workspace number 5, workspace number 5
    $mod+Ctrl+6 move container to workspace number 6, workspace number 6
    $mod+Ctrl+7 move container to workspace number 7, workspace number 7
    $mod+Ctrl+8 move container to workspace number 8, workspace number 8
    $mod+Ctrl+9 move container to workspace number 9, workspace number 9
}
